# Локально: скопируй docker-compose.override.yml.example в docker-compose.override.yml —
# тогда образ будет собираться из текущей папки и код будет подмонтирован.
# На сервере: в .env задай IMAGE_NAME=ghcr.io/владелец/репо:latest и не создавай override.

services:
  todo-api:
    image: ${IMAGE_NAME}
    depends_on:
      - postgres
    ports:
      - "${PORT}:8000"
    environment:
      - DEBUG=${DEBUG}
      - RELOAD=${RELOAD}
      - HOST=${HOST}
      - PORT=${PORT}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable
    restart: unless-stopped
    container_name: todo-api-container

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
